<!-- 3) 
    <body class="bg-light text-center">
1/text-center : centre le texte horizontalement. 
2/bg-light : applique un fond gris clair à la page

    <div class="container mt-5">
3/container : cree une zone centrée dans la page avec des marges automatiques. 
4/mt-5 : ajoute une marge en haut (margin-top) de taille 5

  <h1 class="text-primary">
5/text-primary : applique la couleur principale de Bootstrap (bleu) au texte 

   <p class="lead">
6/lead : met en valeur le paragraphe avec une taille de texte plus grande et plus lisible 

    <img src="oranges.jpg" class="img-fluid rounded shadow" alt="Exemple d'image">
7/img-fluid : rend l’image responsive, elle s’adapte à la taille de l’écran 
8/rounded : ajoute des coins arrondis à l’image 
9/shadow : ajoute une ombre autour de l’image 

    <a href="#" class="btn btn-success">Cliquez ici</a>
10/btn : applique le style bouton Bootstrap 
11/btn-success : applique la couleur verte au bouton -->
